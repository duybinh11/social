spring.datasource.url=jdbc:postgresql://localhost:5432/twittertest
spring.datasource.username=postgres
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=create

spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2MB
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

amazon.aws.access-key=${AWS_ACCESS_KEY:test-access-key}
amazon.aws.secret-key=${AWS_SECRET_KEY:test-secret-key}
amazon.s3.bucket.name=twitterclonestorage

google.api.key=${GOOGLE_API_KEY:test-google-api-key}

jwt.header=Authorization
jwt.secret=dejavu
jwt.expiration=6048000

spring.mail.host=smtp.gmail.com
spring.mail.username=twitter.spring.reactjs@gmail.com
spring.mail.password=${MAIL_PASSWORD:test-mail-password}
spring.mail.port=465
spring.mail.protocol=smtps
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
mail.debug=false

hostname=localhost:3000
